body:
  text: 凡商數為正今令之為負則凡平方皆可開二數立方皆可開三數或一數三乘方皆可開四數或二數異名相步所得為正商同名相步所得為負商實二十負方一十九正隅一正開平方得正商一負商二十商一正法見上右以正方步負實異名相步得正商商實減實方減方隅商二十負次商二負乘隅一百正得二百負以方一百九十正反減之餘方一十負又以商二負乘之得二十正以減實二十負適盡右以正隅步正方同名相步得負商已上平方二數一正一負實六萬負方一萬八千三百八十正廉五百三十七正隅一正開立方得正商三負商第一數四十第二數五百
