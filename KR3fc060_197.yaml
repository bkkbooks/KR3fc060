body:
  text: 開得四正以加小數誤商九得一十三爲所求數復置大數誤商餘實六百一十六正變餘方三十負隅一負如法開之開得一十四正以加大數誤商五十七得七十一爲所求數實五千三百一十二負方一千二百六十四負廉六十七負隅一正開立方應得八十三今初商誤三次商誤八十開訖減實適盡并兩誤商得八十三爲所求數
