body:
  text: 行下二正得七十二正於第四行中下次以第二行中下三十六正乘第一行中下三十二負得一千一百五十二負於第四行中次以第二行中下三十六正乘第一行中一百二十六正得四千五百三十六正於第四行中上次以第二行中八十負乘第一行下二正得一百六十負於第五行中次以第二行中八十負乘第一行中下三十二負得二千五百六十正於第五行中上次以第二行中八十負乘第一行一百二十六正得一萬八十負於第五行上乃并三四五三行上一萬八午負仍爲負中上四千五百三十六正與二千五百六十正相加得七千九十六正中五百四負與一千一百五十二負相加又與一百六十負相加得一千八百一十六負中下一百二十八正與七十二正相加得二百正下八負仍爲負卽第六行實方廉隅之數凡有相等兩數依前求得平方實方隅若以實內加一算或一算已上此平方卽兩數皆不可開以如是兩平方相乘得三乘方實方廉隅此三乘方卽四數皆不可開
