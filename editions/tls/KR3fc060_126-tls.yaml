body:
  text: 子母借商一正如前求得九十七分之一十三以加平除較一十三正共得一十三九十七分之一十三正爲較數以加第二數七正得二十九十七分之一十三正此平方所得之分與立方所得之分仍不同變之令同以平方借商之實方隅重列如下以平除較一十三正與立平較五正相加得一十八正以兩數并如前累乘加減得下子母借商一正如前求得一千八百三十分之二百三十四正以加兩較并一十八正共得一十八一千八百三十分之二百三十四正爲較數以加第一數二正得二十一千八百三十分之二百三十四正爲第三數與立方所得之分同右變除之分爲立方之分兩數并正商七正
