body:
  text: 實一萬四千四十負方二千八百三十八正廉一百五十一負隅一正開立方得第一數九第二數一十二第三數一百三十立方開得第一數九正副之以末商九正減之餘空為寄位以餘方一千五百六十正為實廉一百四十二負為方隅一正仍為隅以平方代開之平方開得一十二正以加前寄位空得第二數一十二正副之以末商二正減之餘一十正為寄位以餘方一百二十負為實隅一正為法以除代開之商一百正商二十正
