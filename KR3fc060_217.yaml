body:
  text: 實內加一得二十六負即不可開實一百正方二十負隅一正開平方得一十今於實內加七得一百七正即不可開依前法兩平方相乘得實二千七百八十二負方一千五百九十正一廉三百三十三負二廉三十正隅一負此三乘方四數皆不可開假令商五減實餘三十二負變之重列實方隅以借商一求得分母一十四負子母同名母又小於子不可命分故不可算若商五以上五以下之數皆不可算緣小數減實惟五最相近也假令商一十減實餘一百八十二負變之重列實
