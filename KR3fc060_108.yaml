body:
  text: 變立方餘子母借商一負以變立方餘求得八百五十四分之一百五十負以加兩數并十五負共得一十五八百五十四分之一百五十負為較數以減第三數一十七正得一八百五十四分之七百四為第一數則與立方所得之分同右變除之分為立方之分兩數并負已上可開三數之分為第一數實二百八十八負方二百三十正廉四十九負隅三正開立方得第一數二正第二數五三十六分之十二正第三數九正商五正子母借商一正立方開得五三十六分之十二正為第二數以末商三十六分之一十二減之餘五正為寄位以借商之實方廉隅續開之
  hash: sha256:81c817bd7f6c62a04abf90c4a54499cfa193def95ed453002b0ea1e32e513cad
