body:
  text: 商八正右空偶位上實下隅異名得商一正若商負則亦恒爲益積故不可開實五百一十二負方空廉空隅一負開立方得負商八商八負右空隅位上實下隅同名得商一負若商正亦恒爲益積故不可開已上以平方立方爲例其實不論平立三乘方凡有空位皆準此凡平方二數以平方開一數其一數可以除代開之立方三數以立方開一數其二數可以平方代開一數除代開一數三乘方四數以三乘方開一數其三數可以立方代開一數平方代開一數除代開一數其法以本乘方先開一數副置先開數加減同名減異名加末商名曰寄位以其餘遞降一乘開之所得加減寄位同名加異名減爲又一數
