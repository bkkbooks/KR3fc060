body:
  text: 方四乘實每上一位則增一乘如是累乘訖如法之所得爲母乘所求數之數以母除之得所求實三十四負方一十五正隅一正開平方得二設如以九爲母乃置實方隅先以九乘隅一正得九正爲隅次以九再乘方一十五正得一千二百一十五正爲方次以九三乘實三十四負得二萬四千七百八十六負爲實重列如法開之開得一十八以母九除之得二爲所求數實五千一百八十四負方空廉七十三正隅一正立方得八設如以七十七爲母乃置實方廉隅先以七十七
