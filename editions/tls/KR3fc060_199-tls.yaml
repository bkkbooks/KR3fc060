body:
  text: 凡開方有之分者以子減母爲餘數以餘數與元實相加減異加同減復爲實如法開之所得較元實所得必多一算實七千七百七十負方空隅一正開平方得八十八一百七十七分之二十六置分母一百七十七正以分子二十六負減之得一百五十一正爲餘數與元實七千七百七十負相加得七千九百二十一爲負實方空仍爲空隅一正仍爲隅如法開得八十九
