body:
  text: 續開得二三分之一負以減前寄位六正餘三三分之二為第一數右減寄位凡可開二數以上或有之分或無之分若先開得有之分者以續開法入之若先開得無之分者以代開法八之實六十四負方三十二正隅三負開平方得第一數二十七分之十二正第二數八正商二正子母借商一正開平方得二一十七分之一十二正為第一數乃列借商之實方隅續開之商六正續開得六正與前寄位二正相加得八正為第二數右續開加寄位開平方得八正為第二數變之以除代開之商五負
