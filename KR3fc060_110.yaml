body:
  text: 商四正立方續開得四正以加寄位五正得九正爲第三數變之以平方代開之商七負平方代開得七負爲較數以減第三數九正得二正爲第一數商三負或立方續開得三負以減寄位五正得二正爲第一數商七正平方代開得七正爲較數以加第一數二正得九正爲第三數商二正右以立方求之分爲之分本數立方開得二正爲第一數變之以平方代開之商三正子母借商一正平方代開得三一十分之四正爲較數以加第一數二正得五一十分之四正爲第二數此平主所
