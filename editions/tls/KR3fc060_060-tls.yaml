body:
  text: 十三萬八千正反減之餘方一萬二千負又以商五負乘之得六萬正以減實六萬負適盡右以正隅步正廉同名相步得負商第二數已上立方三數一正二負實三十億二千四百萬負方四億六千四百二十四萬四千負第一廉六百六十七萬五千六百二十正第二廉八千二百六十四負隅一負開三乘方得正商第一數六第二數八百負商第一數七十第二數九千商六正法見上右以正方步負實異名相步得正商第一數商實減實方減方一廉加一廉二廉減二廉隅
