body:
  text: 變立方餘子母借商一負以變立方餘求得八百五十四分之一百五十負以加兩數并十五負共得一十五八百五十四分之一百五十負爲較數以減第三數一十七正得一八百五十四分之七百四爲第一數則與立方所得之分同右變除之分爲立方之分兩數并負已上可開三數之分爲第一數實二百八十八負方二百三十正廉四十九負隅三正開立方得第一數二正第二數五三十六分之十二正第三數九正商五正子母借商一正立方開得五三十六分之十二正爲第二數以末商三十六分之一十二減之餘五正爲寄位以借商之實方廉隅續開之
