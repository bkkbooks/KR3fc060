body:
  text: 數皆三十七開訖變之以商七乘隅一正得七正以減廉一十四負餘七負以商七乘之得四十九負以減方四十九正適盡又以商七乘隅一得七正以減廉適盡是無較數可除故知三數同為三十七或開訖減去末商七餘三十為寄位以餘方四十九正為實廉一十四負為方隅一正為隅如法開得七與寄位三十相加仍得三十七或代開訖減去末商七餘三十為寄位以餘方七負為實隅一正為法除得七與寄位三十相加仍得三十七凡商數誤多誤少者置餘實變之誤多則商負減之而得所求誤少則商正加之而得所求或各商俱誤
  hash: sha256:624ee5d560a54d19081edea9a4713e99d5976795663bfe3774ec9e13b122805c
