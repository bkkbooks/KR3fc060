body:
  text: 三數它皆放此實九十負方七十三正廉一十六負隅一正開立方得第一數二第二數五第三數九商二正立方開得二正為第一數變之得方二十一正為實廉一十負為方隅一正仍為隅以平方代開之此平方尚可開二正數故知二正為第一數商三正平方開得三正為較數以加第一數二正得五正為第二數變之得方四負為實隅一正為法以除代開之此除尚可開一正數故知五正為第二數商四正除得四正為較數以加第二數五正得九正為第三數或平方開得七正為較數以加第一數二正得九正為第三數變之得方四正為實隅一正為法以除代開之此除無正數可開故知九正為第三數商四負除得四負為較數以減第三數九正得五正為第
