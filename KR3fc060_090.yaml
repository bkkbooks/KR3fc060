body:
  text: 續開得三負以減前寄位七正得四正為第一數右續開減寄位凡代開所得之分與本乘方所得之分不同今立法變之令同以代開得數遍乘其所餘之實方廉隅各與其上一位相加減同加異減則實方廉隅多一位以求之分即多一乘又以前代開得數與後代開得數相加減同加異減為兩數并差相加曰并相減曰差又遍乘實方廉隅各與其上一位相加減則實方廉隅又多一位以求之分又多一乘如是纍求即與本乘方所得同實一千八百三十六負方一千二百八十一正廉一百五十四負隅五正開立方得第一數一八百五十四分之七百四正第二數一十二正第三數一十七正商一正子母借商一正開方立得一八百五十四分之七百四正為第一數石以立方求之分為之分本數
