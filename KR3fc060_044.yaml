body:
  text: 右三乘方凡實不盡則有之分借一算為商如前求得方以方減實實不足減方為母實為子母常為正子常為負翻法則母負子正實三十一負方一十三正隅一負開平方得三六分之一初商三正如法開之餘實一負變之得方七正隅一負借商子母借商一正以南一正乘隅一負得一負以減方七正餘方六正又以商一正乘之得六正以減實一負不足減方六正為母實一負為子右母正子負實方隅如上翻法開平方得九六分之五初商九正如法開之餘實五正變之得方五負隅一負借商子母借商一正以商一正乘隅一負得一負以加方
