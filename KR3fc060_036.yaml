body:
  text: 初商三十正以商三正乘隅一百正得三百正以加方二百九十正得方五百九十正又以商三正乘之得一千七百七十正以減實二千一百四十二負餘三百七十二負為次商實變之以商三正乘隅一百正得三百正以加方五十九正得八千九正為次商方一訖方退一位隅退二位商實減實方加方隅次商四正以商四正乘隅一正得四正以加從八十九正得九十三正又以商四正乘之得三百七十二正以減實三百七十二負適盡右平方實一千六百八十負方五百九十正廉六十六負隅一正益積開立方得五十六商實加實方減方減方廉減廉減廉加廉隅初商五十正以初商五正乘隅一千正得五千
