body:
  text: 置實八十負方二正隅一正於第一行實三十正法六負於第二行乃以第二行下六負乘第一行下一正得六負於第三行下次以第二行下六負乘第一行中下二正得一十二負於第三行中下次以第二行下六負乘第一行中上八十負得四百八十正於第三行中上次以第二行中下三十正乘第一行下一正得三十正於第四行中下次以第二行中下三十正乘第一行中下二正得六十正於第二行中上次以第二行中下三十正乘第一行中上八十負得二千四百負於上乃并三四兩行上二千四百負仍為負中上四百八十正與六十正相加得五百四十正中下一十二負與中下三十正相減得一十八正下六負仍為負即第五行實方廉隅之數實一百二十六正方三十二負隅二正開平方得小數七大數九實八十負方三十六正隅四負開平方得小數四大數五今以兩實方隅相乘得實一萬八十負方七千九十六正一廉一千八百一十六負二廉二百正隅八負開三乘方得第一數四第二數五第三數七第四數
