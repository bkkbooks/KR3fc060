body:
  text: 或次商誤為初商初商誤為次商而實盡并各商皆得所求實二十五負方空隅一正開平方應得五今誤商尤乃置餘實五十六正變餘方一十八正隅一正如法開之開得四負以減誤商九得五為所求數實六十三負方二正隅一正開平方應得七今誤商一乃置餘實六十負變餘方四正隅一正如法開之開得六正以加誤商一得七為所求數實一千九百負方八十一正隅一正開平方應得一十九今誤商四十三
