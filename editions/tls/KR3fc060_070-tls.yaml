body:
  text: 實一萬四千四十負方二千八百三十八正廉一百五十一負隅一正開立方得第一數九第二數一十二第三數一百三十立方開得第一數九正副之以末商九正減之餘空爲寄位以餘方一千五百六十正爲實廉一百四十二負爲方隅一正仍爲隅以平方代開之平方開得一十二正以加前寄位空得第二數一十二正副之以末商二正減之餘一十正爲寄位以餘方一百二十負爲實隅一正爲法以除代開之商一百正商二十正
