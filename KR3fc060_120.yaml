body:
  text: 以平除較三正與立平較七負相減餘四負為兩較差以兩較差如前纍乘纍加減得下子母借商一正如前求之得三十六分之一十二正以加平除較三正共得三三十六分之一十二正為較數以加第一數二正得五三十六分之一十二正為第二數則之分與立方所得之分同右變除之分為立方之分兩數差負已上可開三數之分在第二數實一千九百七十四負方一千三百六十七正廉二百四負隅七正開立方得第一數二正第二數七正第三數二十一千八百三十一分之三十四正商二十正子母借商一正立方開得二十一千八百三十分之二百三十四
