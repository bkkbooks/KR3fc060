body:
  text: 凡以商乘隅減廉適盡則以商乘方加減實如法入之實五十六負方八正廉七正隅一負開立方得七凡以商乘隅減方適盡則次商實即初商實實一百四十四負方七十負隅一正開平方得七十二凡開方止有隅無方廉者其次商已後即與有方廉者同實二千二百九負方空隅一正如平方法開之先開得四十餘變之得實六百九負方八十正隅一正如平方法開得七即與負實正方正隅者同
