body:
  text: 實六百四十負方二百二十四正廉二十六負隅一正開立方得第一數第二數皆八第三數一十先開得第一數卽第二數開訖變之以商八乘隅一正得八正以減廉二十八負餘一十負以商八乘之得八十負以減方八十正適盡餘尚可除一數故知所開八爲第一第二兩數又以商八乘隅一正得八正以減廉一十負餘二負爲實以隅一除之得二正與開得數八相加得一十爲第三數或開訖減去末商八餘空爲寄位以餘方八十正爲實廉一十八負爲方隅一正爲隅如法開得小數八大數一十各與寄位空相加得小數八大數一十其小數卽第一第二兩數實七百二十負方二百六十四正廉二十九負隅一正開立方得第一數五第二數第三數皆一十二
