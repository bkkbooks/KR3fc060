body:
  text: 求得一千八百三十分之二百三十四正以加平方開得數一十三正共得一十三一千八百三十分之二百三十四正爲較數以加第二數七正得二十一千八百三十分之二百三十四正爲第三數與立方所得之分同右變平方之分爲立方之分平方開得數正商五負或平方代開得五負爲較數以減第二數七正得二正爲第一數變之以除代開之初商一十正次商八正子母借商一正除代開得一十八七分之一正爲較數以加第一數二正得二十七分之一爲第三數此除所得之分與平方立方所得之分俱不同先變令與平方同以除借商之實法列下以除得數一十八乘其法實加減上位得下
