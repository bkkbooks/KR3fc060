body:
  text: 變立方餘子母借商一負以變立方餘求得八百五十四分之一百五十負以加平方開得數一十五負共得一十五八百五十四分之一百五十負爲較數以減第三數一十七正得一八百五十四分之七百四爲第一數則與立方所得之分同右變平方之分爲立方之分平方開得數負或平方代開得五負爲較數以減第三數一十七正得一十二正爲第二數變之以除代開之商一十負借商一負除得一十五分之一負爲較數以減第二數一十二正得一五分之四正爲第一數此除所得之分與平方立方所得之分俱不同先變令與平方同置除餘實一正法五正以除得數一十負徧乘之
