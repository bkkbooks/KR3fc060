body:
  text: 商九正又立方開得九正爲第三數如前變之以平方代開之此平方不可開正數故知九正爲第三數商七負平方開得七負爲較數以減第三數九正得二正爲第一數如前變之以除代開之此除尚可開一正數故知二正爲第一數除得三正爲較數以加第一數二正得五正爲第二數或平方開得四負爲較數以減第三數九正得五正爲第二數如前變之以除代開之此除無正數可開故知五正爲第二數除得三負爲較數以減第二數五正得二正爲第一數右本乘方開第三數凡可開二數以上商數皆有之分者原實不盡不可代開如法先開一數乃依放代開法續開之與寄位
