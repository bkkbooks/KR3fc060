body:
  text: 正以兩數差一十負遍乘之如前變之得變立方餘實一百五十正方七百二十五正廉一百二十四負隅五正變平方餘變立方餘子母借商一負以變立方餘求得八百五十四分之一百五十負以加兩數差一十負共得一十八百五十四分之一百五十負以減第二數一十二正得一八百五十四分之七百四正則與立方所得之分同右變除之分為立方之分兩數差負初商一十五次商七正又立方開得一十七正為第三數變之以平方代開之
