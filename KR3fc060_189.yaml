body:
  text: 先開得第二數卽第三數開訖變之以商二乘隅一正得二正以加廉三正得五正以商二乘之得一十正以減方一十負適盡餘無正數可除故知所開得一十二爲第二第三兩數又以商二乘隅一正得二正以加廉五正得七正爲實以隅一正除之得七負與開得數一十二相減得五爲第一數或開訖減去末商二餘一十爲寄位以餘方一十負爲實廉三正爲方隅一正爲隅如法開得正數二負數五以正數二與寄位一十相加仍得一十二卽第二第三兩數以負數五與寄位相減得五卽第一數實五萬六百五十三負方四千一百七正廉一百一十一負隅一正開立方得第一數第二數第三
  hash: sha256:78ff1f7e9bd4d84dbc05c4e89c5e3497917abc6dad22095e631ea4af3ffe08d1
