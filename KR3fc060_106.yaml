body:
  text: 先乘除實一正得一十負為平方實又乘除法五正得五十負以除實一正減之得四十九負為平方方除法五正即為平方隅共得變平方餘實一十負方四十九負隅五正除餘變平方餘借商一負以變平方餘求得五十四分之一十負以加除得數一十負共得一十五十四分之一十負為較數以減第二數一十二正得一五十四分之四十四正為第一數則與平方所得之分同而與立方所得之分仍不同又變之令同以平方開得數五負與除所得數一十負相加得一十五負為兩數并置變平方餘實一十負方四十九負隅五正以兩數并一十五負遍乘之如前變之得變立方餘實一百五十正方七百二十五正廉一百二十日負隅五正變平方餘
  hash: sha256:5870c5cedac6afc737e88572fd595906d21a6af4cd6ed310e9feb4015f81e15a
