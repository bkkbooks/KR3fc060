body:
  text: 之以商乘隅加減第二廉又以南乘之加減第一廉又以商乘之加減方爲次商方是爲一變以商乘隅加減第二廉又以商乘之加減第一廉爲次商第一廉是爲二變以商乘隅加減第二廉爲次商第二廉是爲三變變訖方退一位第一廉退二位第二廉退三位隅退四位約商如前實盡乃止凡加實者名曰益積實不足減而反減者名曰翻法凡一位開盡者無翻法益積實三十六負法三正除實得一十二商實減實法初商一十正以商一正乘法三十正得三十正以減實三十六負餘六負爲次商實法退一位商實減實法次商二正以商二正乘法三正得六正以減實六負適盡右除實二千一百四十二負方二十九正隅一正開平方得三十四商實減實方加方加方隅
