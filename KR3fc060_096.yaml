body:
  text: 二十四負為主方廉平方隅五正即為立方隅共得變立方餘實一百五十正方七百二十五正廉一百二十四負隅五正平方縣變立方餘子母借商一負以變立方餘求得八百五十四分之一百五十負以加平方開得數一十負共得一十八百五十四分之一百五十負為較數以減第二數一十二正得一八百五十四分之七百四為第一數則與立方所得之分同右變平方之分為立方之分平方開得數負商五正或平方代開得五正為較以加第二數一十二正得一十七正為第三數變之以除代開之初商一十負次商五負
