body:
  text: 二數右本乘方開第一數商四正又立方開得五正為第二數如前變之以平方代開之此平方尚可開一正數故知五正為第二數平方開得四為較數以加第二數五正得九正為第三數如前變之以除代開之此除無正數可開故知九正為第三數除得七負為較數以減第三數九正得二正為第一數或平方開得三負為較數以減第二數五正得二正為第一數如前變之以除代開之此除尚可開一正數故知二正為第一數除得七正為較數以加第一數二正得九正為第三數右本乘方開第二數
