body:
  text: 實四千四百六十六負方六百八十七負廉空隅一正開立方得二十九設如以一百七爲母則以一百七徧乘之實得四十七萬七千八百六十二負方七萬三千五百九負廉空隅一百七正如法亦開得二十九凡實方廉隅如意立一數爲母一乘隅再乘廉三乘
