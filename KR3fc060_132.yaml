body:
  text: 借商一正求得數一百三十二分之一十八正以加除得數一十八正共得一十八一百三十二分之一十八正爲較數以加第一數二正得二十一百三十二分之一十八正爲第三數此之分仍與立方不同變之令同以平方借商之實方隅列下以除得數一十八與平方開得數五負相減得一十三正爲兩數差乘實方隅以加上位得下子母借商一正求得一千八百三十分之二百三十四正以加兩數差一十三正得一十三一千八百三十分之二百三十四正爲較數以加第二數七正得二十一千八百三十分之二百三十四正爲第三數右變除之分爲立方之分兩數差正已上可開三數之分在第三數
  hash: sha256:7a9f53111401437f49254314ccaa37f58dc9097dec855881aef45f74bf2393ec
