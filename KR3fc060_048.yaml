body:
  text: 以隅三為母以母三乘實四百三十七負得一千三百八十一負為實方四十正仍為方以母三除隅三正得一正為隅如法開之初商二十次商一開得二十一以母三除之得七為所求數右平方開方盡以母除之亦盡實九百四十二分之一負方四正廉二分之一正隅一正開立方得九二分之一如法通之得實一千八百八十一負方八正廉一正隅二正以隅二為母以母二再乘實一千八百八十一負得七千五百二十田負為實一乘方八正得一十六正為方廉一正仍為廉以母二除隅二正得隅一正為隅如法開之初商一十
