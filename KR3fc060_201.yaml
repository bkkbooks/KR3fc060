body:
  text: 實一千負方三百七十五正廉三十六負隅一正開立方得一十二五十六分之四十四借商子母置分母五十六負以分子四十四正減之得一十二負爲餘數與元實一千負相減得九百八十八爲負實方三百七十三正仍爲方廉三十六負仍爲廉隅一正仍爲隅如法開得一十三凡有正負各數累乘之卽得實方廉隅各數實二十五負法一正除得二十五正實二十五正法一正除得二十五負今以兩法實相乘得實六百二十五負方空隅一正開平方得數正負皆二
