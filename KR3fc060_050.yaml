body:
  text: 次商九開得一十九以母除之得九二分之一爲所求數右立方開方盡以母除之不盡實三十二七分之六負方二負第一廉空第二廉一七分之一正隅七分之五正開三乘方得二五分之一分千九百二十一分之七千三百一十一加法通之得實二百三十負從一十四負第一廉空第二廉八正隅五正以隅五爲母以母五三乘實得二萬八千七百五十負爲實再乘方得三百五十負爲方當以母一乘第一廉爲第一廉今第一廉空不乘第二廉八正仍爲第二廉以母五除隅五正得一正爲隅如法開之初商一十
