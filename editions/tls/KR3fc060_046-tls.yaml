body:
  text: 五負得方六負又以商一正乘之得六負以減實五正不足減方六負爲母實五正爲子右母負子正凡問數有之分者通之母不同者齊同而通之如法開之實二百三四分之一負方一十一三分之一正隅一四分之一正開平方得九法先齊同之得實二百三一十二分之三負方一十一一十二分之四正隅一一十二分之三正又各通之得實二千四百三十九負方一百三十六正隅一十五正如法開之一術如前通之訖以隅爲母平方以母乘實除隅立方以母再乘實一乘方除隅三乘方以母三乘實再乘方一乘第一廉除隅乃開之得數以母除之爲所求實一百六四分之三負方一十正隅四分之三正開平方得七如法通之得實四百二十七負方四十正隅三正
