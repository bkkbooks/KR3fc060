body:
  text: 次商一借子母母八千九百二十一正子七千三百一十一負開得一十一八千九百二十一分之七千三百一十一以母五除之得二五分之一八千九百二十一分之七千三百一十一右三乘方開方不盡以母除之亦不盡凡不可開者爲無數實一百負方一正隅一十負右不可步故不可開實一萬負方一百九十正隅一負右雖得初商而不可求次商故不可開實一百四十五負方二十四正隅一負
