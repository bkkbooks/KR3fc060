body:
  text: 三數它皆放此實九十負方七十三正廉一十六負隅一正開立方得第一數二第二數五第三數九商二正立方開得二正爲第一數變之得方二十一正爲實廉一十負爲方隅一正仍爲隅以平方代開之此平方尚可開二正數故知二正爲第一數商三正平方開得三正爲較數以加第一數二正得五正爲第二數變之得方四負爲實隅一正爲法以除代開之此除尚可開一正數故知五正爲第二數商四正除得四正爲較數以加第二數五正得九正爲第三數或平方開得七正爲較數以加第一數二正得九正爲第三數變之得方四正爲實隅一正爲法以除代開之此除無正數可開故知九正爲第三數商四負除得四負爲較數以減第三數九正得五正爲第
