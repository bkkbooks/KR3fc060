body:
  text: 凡除之位上實下法商在實上平方之位上實中方從從亦日方下隅商在實上立方上實次方從次廉下隅商在實上三乘方上實次方從次苐一廉亦日上廉次苐二廉亦日下廉下隅商在實上自三乘方以上每增一乘卽多一廉四乘方有苐三廉五乘方有苐四廉之類商實法右除商實方隅右平方商實方廉隅右立方商實方一廉二廉隅右三乘方凡實常爲負商常爲正除法爲正開方方廉有正有負有空隅有正有負凡正方正廉正隅亦謂之從方從廉從隅負方負廉負隅亦謂之益方益廉益隅凡上負下正可開一數除一平方三立方八三乘方二十上負中正下負可開二數平方一立方五三乗
