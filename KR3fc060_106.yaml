body:
  text: 先乘除實一正得一十負爲平方實又乘除法五正得五十負以除實一正減之得四十九負爲平方方除法五正卽爲平方隅共得變平方餘實一十負方四十九負隅五正除餘變平方餘借商一負以變平方餘求得五十四分之一十負以加除得數一十負共得一十五十四分之一十負爲較數以減第二數一十二正得一五十四分之四十四正爲第一數則與平方所得之分同而與立方所得之分仍不同又變之令同以平方開得數五負與除所得數一十負相加得一十五負爲兩數并置變平方餘實一十負方四十九負隅五正以兩數并一十五負徧乘之如前變之得變立方餘實一百五十正方七百二十五正廉一百二十日負隅五正變平方餘
  hash: sha256:15269e6bd5e4d0747aa7149019513625f53a0766a731b987aa9146718c6c71e5
