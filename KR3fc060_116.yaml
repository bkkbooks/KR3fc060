body:
  text: 右變除之分為立方之分兩數差正商九正立方開得九正為第三數變之以平方代開之商三負借商一負平方開得三一十一分之八負為較數以減第三數九正得五一十一分之三正為第二數此平方所得之分與立方不同變之令與立方同以平方借商之實方隅重列如下以立平較三負如前纍乘纍加減得下借商一負如前求之得三十六分之二十四負以加平立較三負共得三三十六分之二十四負為較數以減第三數九正得五三十六分之一十二正為第二數與立方所得之分同右變平方之分為立方之分平方開得數負
