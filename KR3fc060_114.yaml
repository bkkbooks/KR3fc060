body:
  text: 正餘五三分之一正爲第二數此除所得之分與平方立方所得之分皆不同今先變令與平方同以借商法實重列如下以較數三負去之分不用如前累乘累加減得下借商一負得一十分之六負以加較數三負共得較數三一十八之六負以減第三數九正得五一十分之四正爲第二數此平方之分仍與立方所得不同又變之令同以平方借商實方隅重列如下以平除較三負與立平較七正相減餘四正爲兩較差以兩較差累乘累加減得下借商一負如前求之得三十六分之二十四負以加平除較三負得三三十六分之二十四負爲較數以減第三數九正得五三十六分之一十二正爲第二數與立方所得之分同
