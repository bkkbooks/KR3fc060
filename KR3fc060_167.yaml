body:
  text: 開得六百一十六以母七十七除之得八為所求數凡實方廉隅如意立一數為母一除隅再除廉三除方四除實每上一位則增一除如是纍除訖如法開之所得為母除所求數之數以母乘之得所求實九百三十一萬五千二百八十負方五萬九千八百二十六正隅九十一正開平方得一百三十設如以一十三為母乃置實方隅先以一十三除隅九十一正得七正為隅次以一十三再除方五萬九千八百二十六正得三百五十四正為方次以一十三三除實九百三十一萬五千二百八十
  hash: sha256:de8d0edcfcc00e20aa472ca1678348ac97e307d5ef28779357c5c6db4a9daa6d
