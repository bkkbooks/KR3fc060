body:
  text: 開得三百三十與寄位三千相加得三千三百三十爲第三數以末商三十減之餘三千三百爲寄位乃列餘方三十正爲實隅一負爲法除之除得三十三與寄位三千三百相加得三千三百三十三爲第四數凡可開二數以上而各數俱等者非無數也以代開法入之可知實二百八十九負方三十四正隅一負開平方得第一數第二數皆一十七開訖變之以商七乘隅一負得七負以減方七正適盡無數可除是無較數故知兩數皆一十七或開訖減去末商七餘一十爲寄位以餘方七正爲實隅一負爲法除得七以加寄位一十仍得一十七
