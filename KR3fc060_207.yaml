body:
  text: 正得五十四正於第四行中次以第二行中二十七正乘第一行中一十四負得三百七十八負於第四行上乃并三四兩行上三百七十八負仍爲負中一百二十六正與五十四正相加得一百八十正下九負仍爲負卽第五行實方隅之數實八十負方二正隅一正開平方得正數八負數一十實三十正法六負除得五正今以實方隅與法實相乘得實二千四百負方五百四十正廉一十八正隅六負開立方得小數五大數八負數一十第一行第二行第三行第四行第五行
