body:
  text: 初商一十負次商五負借商一負平方代開得一十五五十四分之一十負爲較數以減第三數一十七正得一五十四分之四十四正爲第一數此平方所得之分與立方所得之分不同變之令同置平方餘實一十負方四十九負隅五正以平方開得數一十五負徧乘之先乘平方實一十負得一百五十正爲立方實又乘平方方四十九負得七百三十五正以平方實一十負減之得七百二十五正爲立方方又乘平方隅五正得七十五負以加平方方四十九負得一百二十四負爲立方廉平方隅五正卽爲立方隅共得變立方餘實一百五十正方七百二十五正廉一百二十四負隅五正平方餘
