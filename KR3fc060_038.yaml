body:
  text: 正以減廉六千六百負餘廉一千六百負又以商五正乘之得八千負以減方五千九百正不足減反減之餘從二千一百負以商五正乘之得一萬五百負以加實一千六百八十負得一萬二千一百八十負為次商實變之以商五正乘隅一千正得五千正以廉一千六百負反減之餘廉三千四百正又以商五正乘之得一萬七千正以方二千一百負反減之餘一萬四千九百正為次商方已上一變以商五正乘隅一千正得五千正以加廉三千四百正得八千四百正為次商廉已上二變訖方退一位廉退二位隅退三位商實減實方加方廉加廉次商六正以商六正乘隅一正得六正以加廉八十四正得廉九十正又以商六正乘之得五百四十正以加方一千四百九十正得方二千三十正又以商六正乘之得一萬二千一百八十正以減實一萬二千一百八十負適盡右立方
  hash: sha256:61a5f6a4e8b45dead0a2a44801e5b9cfb709f22f73c31f48c66e96189c2632bd
