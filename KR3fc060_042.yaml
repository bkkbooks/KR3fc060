body:
  text: 以商方已上一變又以商七正乘隅一萬負得七萬負以加二廉四萬二千負得二廉一十一萬二千負又以商七正乘之得七十八萬四千負以加一廉二十七萬四千負得一百五萬八千負為次商一廉已上二變又以商七正乘隅一萬負得七萬負以加二廉一十一萬二千負得一十八萬二千負為次商二廉已上三變訖方退一位一廉退二位二廉退三位隅退四位商實減實方加方一廉加一廉二廉加二廉隅次商八以商八正乘隅一負得八負以加二廉一百八十二負得二廉一百九十負又以商八正乘之得一千五百二十負以加一兼一萬五百八十負得一廉二萬二千一百負又以商八正乘之得九萬六千八百負以加方一十六萬一千三百負得方二十五萬八千負又以商八正乘之得二百六萬四千負以減實二百六萬四千正適盡
