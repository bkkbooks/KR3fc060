body:
  text: 右以負隅步負二廉同名相步得負商第二數已上三乘方四數二正二負凡方廉有空位視所空之位爲一位三位等奇數者空位之上下異名可商一正一負同名正負皆不可商所空之位爲二位四位等偶數者空位之上下異名可商一正而不可商負同名可商一負而不可商正實八十一負方空隅一正開平方得正商九負商九商九正商九負右空奇位上實下隅異名得商一正一負若實隅同名則商正商負皆恒爲益積故不可開實五百一十二負方空廉空隅一正開立方得正商八
