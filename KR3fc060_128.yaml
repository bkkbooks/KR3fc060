body:
  text: 又立方開得七正爲第二數變之以平方代開之初商一十正次商三正子母借商一正平方代開得一十三一百三十二分之一十八正爲較數以加第二數七正得二十一百三十二分之十八正爲第三數此平方所得之分與立方所得不同變之令同以平方分借商之實方隅重列如下以立平較一十三正如前累乘其實方隅以加減上位得下子母借商一正
