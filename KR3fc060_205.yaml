body:
  text: 五行實方隅之數實一十四負法二正除得七正實二十七正法九負除得三正今以兩法實相乘得實三百七十八負方一百八十正隅一十八負開平方得小數三大數七第一行第二行第三行第四行第五行置實一十四負法二正於第一行實二十七正法九負於第二行乃以第二行下九負乘第一行下二正得一十八負於第三行下次以第二行下九負乘第一行中一十四負得一百二十六正於第三行中次以第二行中二十七正乘第一行下二
