body:
  text: 所求數凡開方有正商負商者以其實方廉隅之正負遍易之如法開之所得之正商負商與不易同實三百一十五負方二十六負隅一正開平方得正商三十五負商九今令實三百一十五負易為正方二十六負易為正隅一正易為負如法開之亦得正商三十五負商九
