body:
  text: 商七負或平方代開得七負為較數以減第三數九正得二正為第一數變之以除代開之商三正子母借商一正除代開得三三分之一正以加第一數二正得五三分之一正為第二數此除所得之分與平方立方俱不同先變令與平方同以除借商之實法重列如下以平除較三正如前纍乘纍加減得下子母借商一正如前求之得一十一分之三正以加平除較三正共得三一十一分之三正為較數以加第一數二正得五一十一分之三正為第二數此平方之分與立方仍不同又變之令與立方同以平方借商之實方隅重列如下
  hash: sha256:77227d83a542fb9a1e64352837c4766b54b3bd73566af60358573a23947475f1
