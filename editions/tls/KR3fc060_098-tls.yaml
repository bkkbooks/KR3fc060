body:
  text: 借商一負除得一十五五分之一負爲較數以減第三數一十七正得一五分之四正爲第一數此除所得之分與平方立方所得之分俱不同先變令與平方同置除餘實一正法五正以除得數一十五負徧乘之先乘除實一正得一十五負爲平方實又乘除法五正得七十五負以除實一正減之得七十四負爲平方方除法五正卽爲平方隅共得變平方餘實一十五負方七十四負隅五正除餘變平方餘借商一負以變平方餘求得七十九分之一十五負以加除得數一十五負共得一十五七十九分之一十五負爲較數以減第三數一十七正得一七十九分之六十四正爲第一數則與平方所得之分同與立方所得之分仍不同又變之令同以平方開得數五正與除得數一十五負相減得一十負爲兩數差置變平方餘實一十五負方七十四負隅五
  hash: sha256:51de53e79b55ed22dca0fc26e56c080f7a26f8239deb9279c2dc28d4ab97f488
