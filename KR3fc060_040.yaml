body:
  text: 實七萬八千負方一萬六千六百正第一廉一千七百六十負第二廉九十八正隅一負翻法開三乘方得七十八商實減實方加方減方一廉減一廉減一廉加一廉二廉減二廉減二廉加二廉加二廉隅初商七十正以商七正乘隅一萬負得七萬負以減二廉九萬八千正餘二廉二萬八千正又以商七正乘之得一十九萬六千正以一廉一十七萬六千負反減之餘一廉二萬正又以商七正乘之得一十四萬正以加方一十六萬六千正得方三十萬六千正又以商七正乘之得二百一十四萬二千正以實七萬八千負反減之餘二百六萬四千正爲次商實變之以商七正乘隅一萬負得七萬負以二廉二萬八千正反減之餘二廉四萬二千負又以商七正乘之得二十九萬四千負以一廉二萬正反減之餘一廉二十七萬四千負又以商七正乘之得一百九十一萬八千負以方三十萬六千正反減之餘一百六十一萬二千負爲
