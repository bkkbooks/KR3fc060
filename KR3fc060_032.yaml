body:
  text: 丨步負廉商卜一一十萬一丨丨丨丨凡求第二第四等隅數用翻法若一位開盡者無翻法凡商之法除以商乘法以減實為次商實法退一位約商如前實盡乃止平方以商乘隅同名相乘所得為正異名相乘所得為負加減方同名加異名減不足減者反減之正者負之負者正之又以商乘之加減實為次商實乃變之以商乘隅加減方為次商方是為一變變訖方退一位隅退二位約商如前實盡乃止立方以商乘隅加減廉又以商乘之加減方又以商乘之加減實為次商實乃變之以商乘隅加減廉又以商乘之加減方為次商方是為一變以商乘隅加減廉為次商廉是為二變變訖方退一位廉退二位隅退三位約商如前實盡乃止三乘方以商乘隅加減第二廉又以商乘之加減第一廉又以商乘之加減方又以商乘之加減實為次商實乃變
