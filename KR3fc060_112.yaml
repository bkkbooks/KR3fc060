body:
  text: 得之分與立方所得之分不同變之令同以借商之實方隅重列如下借商一正以較數去之分三正乘平方實四正得一十二正為立方實又以較數三正乘平方方一十三負得三十九負以平方實四正減之餘三十五負為立方方又以較數三正乘平方隅三正得九正以減平方方一十三負餘四負為立方廉平方隅即為立方隅列之如下子母借商一正如前求之得三十六分之一十二正與立方所得之分同右變平方之分為立方之分平方開得數正商七正或平方代開得七正為較數以加第一數二正得九為第三數變之以除代開之商三負借商一負除代開得三三分之二負為較數以減第三數九
