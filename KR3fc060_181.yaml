body:
  text: 第二數初次三三商卽第三數如此者若以本乘方開之止得第一數以代開法入之則各數皆可知實一百九萬八千七百九十億一千一百萬負方一千三百五十八億八千六百七十萬七千正一廉六千二百九十七萬五千七百九十負二廉一萬二千九百六十三正隅一負開三乘方得第一數三千第二數三千三百第三數三千三百三十第四數三千三百三十三先開得三千以末商三千減之餘空爲寄位乃列餘方三百六十六億二千六百三十三萬七千負正爲實一廉三千三十萬八萬六千七百九十負爲方二廉九千八百六十三正爲方隅一負爲隅
