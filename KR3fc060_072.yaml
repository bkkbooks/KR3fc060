body:
  text: 除得一百二十正以加前寄位一十正得第三數一百三十正右立方得第一數平方得第二數除得第三數代開所得皆正商一十正商二正先以立方開得第二數一十二正副之以末商二正減之餘一十正為寄位以餘方一百二十負為實廉一百一十九負為方隅一正仍為隅以平方代開之商一負平方開得一負以減前寄位一十正餘得第一數九正副之以末商一負加之得一十正為寄位以餘方一百二十負為實隅一正為法以除代開之商一百正
