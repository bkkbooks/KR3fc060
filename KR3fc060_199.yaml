body:
  text: 凡開方有之分者以子減母為餘數以餘數與元實相加減異加同減復為實如法開之所得較元實所得必多一算實七千七百七十負方空隅一正開平方得八十八一百七十七分之二十六置分母一百七十七正以分子二十六負減之得一百五十一正為餘數與元實七千七百七十負相加得七千九百二十一為負實方空仍為空隅一正仍為隅如法開得八十九
