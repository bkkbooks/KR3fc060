body:
  text: 丨步負廉商卜一一十萬一丨丨丨丨凡求第二第四等隅數用翻法若一位開盡者無翻法凡商之法除以商乘法以減實爲次商實法退一位約商如前實盡乃止平方以商乘隅同名相乘所得爲正異名相乘所得爲負加減方同名加異名減不足減者反減之正者負之負者正之又以商乘之加減實爲次商實乃變之以商乘隅加減方爲次商方是爲一變變訖方退一位隅退二位約商如前實盡乃止立方以商乘隅加減廉又以商乘之加減方又以商乘之加減實爲次商實乃變之以商乘隅加減廉又以商乘之加減方爲次商方是爲一變以商乘隅加減廉爲次商廉是爲二變變訖方退一位廉退二位隅退三位約商如前實盡乃止三乘方以商乘隅加減第二廉又以商乘之加減第一廉又以商乘之加減方又以商乘之加減實爲次商實乃變
