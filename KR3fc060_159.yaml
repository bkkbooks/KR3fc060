body:
  text: 借商子母置得數一十一以分母一千六百三十乘之得一萬七千九百三十以分子一百三十三加之得一萬八千六十三大於元實故不可還元凡實方廉隅如意立一數為母遍乘之如法開之所得與不乘同實三十負方七隅一正開平方得一十設如以五十一為母則以五十一遍乘之實得一千五百三十負方得三百五十七負隅得五十一正如法亦開得一十
