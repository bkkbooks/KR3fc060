body:
  text: 實八負法一正依前法自相乘得實六十四正方一十六負隅一正開平方得第一第二兩數皆人今於實內加一得六十五正即不可開假令商八減實餘一正變之重列實方隅以借商一求得分母一正子母同名數又相等即不可命分故不可算假令商九減實餘二正變之重列實方隅以借商一求得分母四正子母又同名不可命分故不可算假令商七減實餘二正變之重列實方隅以借商一求得分母一負母小於子不可命分算若七以下之數減實後變餘以借商於子故皆不可算實二十五負方一十正隅一負開平方得五今於
  hash: sha256:e9154b9034a337f9c2f593dc8ecf98104edc81ecad21cbdeeeae3c95e545aecc
