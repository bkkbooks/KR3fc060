body:
  text: 設如以一十一為母乃置實方廉隅先以一十一除隅三百一十九正得二十九正為隅次以一十一再除廉十萬八千七百七十九負得八百九十九負為廉次以一十一三除方一千一百七十七萬二千六百九十五負得八千八百四十五負為方次以一十一四除實一億一千五百九十一萬二千七百九十七負得七千九百一十七負為實重列如法開之開得三十九以母一十一乘之得四百二十九為
