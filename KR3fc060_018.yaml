body:
  text: 右三乘方七已上皆有負次正次負下正可開三數或一數實負方正一廉負二廉正隅負右三乘方一已上上負次正次負次正下負可開四數或二數凡步之法除置實法萬千百十一上下相當商一法進一商十又進如前商百至不可進而約初商實不可減法則不可進平方置實方隅萬千百十一上下相當商一方進一位隅進二位商十又進如前商百至不可進而約初商立方置實方廉隅萬千百十一上下相當商一方進一位廉進二位隅進三位商十又進如前商百至不可進而約初商三乘方置實方第一廉第二廉隅萬千百十一上下相當商一方進一位第一廉進二位第二廉進三位隅進四痊商十又進如前商百至不可進而約初商實四百負法二正法除實得二百商實法二如法列位商實法法進一弎商一凡算式有斜畫者一一爲負無者爲正弎位商十商法法如前又進商百不
