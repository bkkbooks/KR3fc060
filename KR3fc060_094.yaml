body:
  text: 商一十負借商一負平方代開得一十七十九分之一十五負爲較數以減第二數一十二正得一七十九分之六十四正爲第一數此平方所得之分與立方所得之分不同變之令同置平方餘實一十五負方七十四負隅五正以平方開得數一十負徧乘之先乘平方實一十五負得一百五十五正爲立方實又乘平方方七十四負得七百四十正以平方實一十五負減之餘七百二十五正爲立方方又乘平方隅五正得五十負以加平方方七十四負得一百
