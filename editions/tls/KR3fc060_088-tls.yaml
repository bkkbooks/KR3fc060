body:
  text: 代商一負除得五三分之一負爲較數以減第二數八正得二三分之二正爲第一數右代開較數減實一百一十六負方四十五正隅四負開平方得第一數四正第二數七十五分之三正商四正開平方得四正爲第一數變之以除代開之商三正除得三四分之一正爲較數以加第一數四正得七四分之一正爲第二數右代開較數加商七正子母借商一正開平方得七一十五分之三正爲第二數乃列借商之實方隅續開之商三負
